<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🎉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container yes-container">
        <h1 class="yes-title">YO TE AMO MAS AY QUE RICO 💕💕💕</h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" alt="celebrating">
        </div>

        <p class="yes-message">Espero que te guste esta pequeña cosita que preparé para vos bebu</p>
    </div>

    <div class="photo-gallery">
        <h2 class="gallery-title">Nuestros Momentos ✨</h2>
        <div class="photos-container">
            <!-- Foto 1 -->
            <div class="photo-card">
                <img src="ruta-a-tu-foto1.jpg" alt="Nosotros 1">
                <p class="photo-caption">Un día inolvidable 💖</p>
            </div>
            <!-- Foto 2 -->
            <div class="photo-card">
                <img src="ruta-a-tu-foto2.jpg" alt="Nosotros 2">
                <p class="photo-caption">Cómplices siempre 🐻</p>
            </div>
            <!-- Foto 3 -->
            <div class="photo-card">
                <img src="ruta-a-tu-foto3.jpg" alt="Nosotros 3">
                <p class="photo-caption">Por muchos más 🥂</p>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="music\Café Tacvba - Eres.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="yes-script.js"></script>
</body>
</html>
